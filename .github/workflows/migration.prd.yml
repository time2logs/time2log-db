name: migration.prd.yml
on:
  push:
    tags: ["db-v*.*.*"]

concurrency:
  group: db-prd
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations to PRD
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PRD }}
        run: |
          # Try multiple sources for database password
          export SUPABASE_DB_PASSWORD="${{ secrets.SUPABASE_DB_PASSWORD_PRD }}"
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Warning: SUPABASE_DB_PASSWORD_PRD not found, trying environment variable..."
            export SUPABASE_DB_PASSWORD="$SUPABASE_DB_PASSWORD"
          fi
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push