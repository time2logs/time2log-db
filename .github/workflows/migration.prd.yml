name: migration.prd.yml
on:
  push:
    tags: ["db-v*.*.*"]

concurrency:
  group: db-prd
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Pull latest changes and Push migrations to PRD
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PRD }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PRD }}
        run: |
          # Force pull latest changes
          git fetch origin main && git reset --hard origin/main
          
          # Set database password from environment variable (already set in env block)
          export SUPABASE_DB_PASSWORD="${{ secrets.SUPABASE_DB_PASSWORD_PRD }}"
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Error: SUPABASE_DB_PASSWORD_PRD not found"
            exit 1
          fi
          
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --yes